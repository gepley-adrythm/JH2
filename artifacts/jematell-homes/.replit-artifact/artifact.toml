kind = "web"
previewPath = "/"
title = "Jematell Homes"
version = "1.0.0"
id = "artifacts/jematell-homes"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24862

[services.development]
run = "pnpm --filter @workspace/jematell-homes run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/jematell-homes", "run", "build" ]
publicDir = "artifacts/jematell-homes/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24862"
BASE_PATH = "/"
