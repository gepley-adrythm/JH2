openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: faqs
    description: FAQ operations
  - name: contact
    description: Contact form operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /faqs:
    get:
      operationId: listFaqs
      tags: [faqs]
      summary: List FAQs
      description: Returns FAQ summaries, optionally filtered by category, topic, service, search query, or featured flag.
      parameters:
        - name: category
          in: query
          required: false
          schema:
            type: string
        - name: topic
          in: query
          required: false
          schema:
            type: string
        - name: service
          in: query
          required: false
          schema:
            type: string
        - name: q
          in: query
          required: false
          schema:
            type: string
        - name: featured
          in: query
          required: false
          schema:
            type: boolean
      responses:
        "200":
          description: A list of FAQ summaries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FaqListResponse"
  /faqs/admin/check-duplicate:
    get:
      operationId: checkFaqDuplicate
      tags: [faqs]
      summary: Check for duplicate FAQ intent
      description: Returns existing FAQs whose question intent overlaps with the provided query. Guardrail against publishing duplicate-intent content.
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Duplicate intent matches
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DuplicateCheckResponse"
  /faqs/{slug}:
    get:
      operationId: getFaq
      tags: [faqs]
      summary: Get an FAQ by slug
      description: Returns a single FAQ with its related FAQs.
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: The FAQ detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FaqDetailResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /contact:
    post:
      operationId: submitContact
      tags: [contact]
      summary: Submit a contact form lead
      description: Sends an email notification for a new contact form submission.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactRequest"
      responses:
        "200":
          description: Submission accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactResponse"
        "400":
          description: Invalid submission
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Email delivery failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    FaqSummary:
      type: object
      properties:
        slug:
          type: string
        question:
          type: string
        shortAnswer:
          type: string
        categorySlug:
          type: string
        categoryTitle:
          type: string
        topicSlugs:
          type: array
          items:
            type: string
        tags:
          type: array
          items:
            type: string
      required:
        - slug
        - question
        - shortAnswer
        - categorySlug
        - categoryTitle
        - topicSlugs
        - tags
    FaqDetail:
      type: object
      properties:
        slug:
          type: string
        question:
          type: string
        shortAnswer:
          type: string
        answer:
          type: string
        answerHtml:
          type: string
          nullable: true
        metaDescription:
          type: string
        categorySlug:
          type: string
        categoryTitle:
          type: string
        topicSlugs:
          type: array
          items:
            type: string
        tags:
          type: array
          items:
            type: string
        relatedServiceSlugs:
          type: array
          items:
            type: string
        relatedFaqSlugs:
          type: array
          items:
            type: string
        pillarBlogSlug:
          type: string
          nullable: true
        updatedDate:
          type: string
      required:
        - slug
        - question
        - shortAnswer
        - answer
        - answerHtml
        - metaDescription
        - categorySlug
        - categoryTitle
        - topicSlugs
        - tags
        - relatedServiceSlugs
        - relatedFaqSlugs
        - pillarBlogSlug
        - updatedDate
    FaqListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/FaqSummary"
        total:
          type: integer
      required:
        - items
        - total
    FaqDetailResponse:
      type: object
      properties:
        faq:
          $ref: "#/components/schemas/FaqDetail"
        related:
          type: array
          items:
            $ref: "#/components/schemas/FaqSummary"
      required:
        - faq
        - related
    DuplicateMatch:
      type: object
      properties:
        slug:
          type: string
        question:
          type: string
        score:
          type: number
      required:
        - slug
        - question
        - score
    DuplicateCheckResponse:
      type: object
      properties:
        query:
          type: string
        matches:
          type: array
          items:
            $ref: "#/components/schemas/DuplicateMatch"
      required:
        - query
        - matches
    ContactTracking:
      type: object
      description: Marketing attribution captured from the visitor's session.
      properties:
        gclid:
          type: string
        utm_source:
          type: string
        utm_medium:
          type: string
        utm_campaign:
          type: string
        source:
          type: string
          description: Resolved source (UTM if present, else derived from referrer).
        medium:
          type: string
          description: Resolved medium (UTM if present, else derived from referrer).
        referrer:
          type: string
        landing_page:
          type: string
        trigger_url:
          type: string
      required:
        - gclid
        - utm_source
        - utm_medium
        - utm_campaign
        - source
        - medium
        - referrer
        - landing_page
        - trigger_url
    ContactRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        email:
          type: string
          format: email
        phone:
          type: string
        message:
          type: string
        tracking:
          $ref: "#/components/schemas/ContactTracking"
      required:
        - name
        - email
        - phone
        - message
        - tracking
    ContactResponse:
      type: object
      properties:
        success:
          type: boolean
      required:
        - success
